<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>ZauberBlockly</title>
    <script>
      /**
       * Single Page App routing for GitHub Pages.
       * When GitHub Pages serves this 404.html for unknown sub-paths (e.g. /lehrkraft),
       * we encode the intended path as a query-param and redirect to the SPA root.
       * The main index.html then restores the original path via history.replaceState.
       *
       * Based on: https://github.com/rafgraph/spa-github-pages
       */
      (function () {
        var segmentsToKeep = 1; // keep the first path segment
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.host +
            l.pathname
              .split('/')
              .slice(0, 1 + segmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
